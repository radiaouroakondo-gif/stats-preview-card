<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Stats preview card component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,wght@0,100..900;1,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Lexend+Deca:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div class="imag-container">
          <picture>
            <source
              media="(min-width: 1024px)"
              srcset="./images/image-header-desktop.jpg"
            />
            <img
              class="header-img"
              src="./images/image-header-mobile.jpg"
              alt="header image"
            />
          </picture>
          <div class="overlay"></div>
        </div>

        <div class="card">
          <h1 class="title">
            Get <span class="hight">insights</span> that help your business
            grow.
          </h1>

          <p class="description">
            Discover the benefits of data analytics and make better decisions
            regarding revenue, customer experience, and overall efficiency.
          </p>

          <div class="stats">
            <div class="companies">
              <h2 class="stat-number">10K+</h2>
              <p class="stat-label">COMPANIES</p>
            </div>

            <div class="templates">
              <h2 class="stat-number">314</h2>
              <p class="stat-label">TEMPLATES</p>
            </div>

            <div class="queries">
              <h2 class="stat-number">12M+</h2>
              <p class="stat-label">QUERIES</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer> -->
  </body>
</html>
